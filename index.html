<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siri-Style Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'voice-assistant-v2';

        let user = null;
        let longTermMemory = {};
        const apiKey = ""; 

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();

        onAuthStateChanged(auth, async (u) => {
            user = u;
            if (user) {
                const memoryDoc = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'memory'));
                if (memoryDoc.exists()) {
                    longTermMemory = memoryDoc.data();
                }
            }
        });

        async function updateMemory(newData) {
            if (!user) return;
            longTermMemory = { ...longTermMemory, ...newData };
            await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'memory'), longTermMemory);
        }

        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status');
        const transcriptText = document.getElementById('transcript');
        const orb = document.getElementById('main-orb');
        const barsContainer = document.getElementById('bars');

        let isBusy = false;
        let preferredVoice = null;
        let audioPlayer = new Audio();

        // Music Tracks (Safe, Royalty Free)
        const tracks = [
            { name: "Lo-Fi Beats", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" },
            { name: "Chill Synth", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" },
            { name: "Acoustic Vibes", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" }
        ];

        for(let i=0; i<12; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.animationDelay = `${i * 0.1}s`;
            barsContainer.appendChild(bar);
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;

        function loadVoices() {
            const voices = synth.getVoices();
            preferredVoice = voices.find(v => v.lang.startsWith('en') && (v.name.includes('Female') || v.name.includes('Samantha') || v.name.includes('Google US English')));
            if (!preferredVoice && voices.length > 0) preferredVoice = voices[0];
        }
        if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
        loadVoices();

        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;

        const roastLibrary = [
            "I do not have the time or the crayons to explain this to you.",
            "You have the attention span of an ice cream in July.",
            "I will not have a battle of wits with someone who is unarmed.",
            "This looks like something I would draw with my left hand.",
            "If you see the silly-kid catcher, you’d better hide!",
            "Why do you look like an envelope with no address on it?",
            "It appears that your brain cells are not holding hands right now.",
            "You were a slippery baby.",
            "May the chocolate chips in your cookies always turn out to be raisins.",
            "You have your entire life to be a knucklehead. You can take today off.",
            "Who ate your bowl of sunshine this morning, thundercloud?",
            "You are proof that the universe has a sense of humor.",
            "Where’s your off button?",
            "Sometimes it’s better to keep your mouth shut and let people think you’re silly than open it and confirm their suspicions.",
            "You must have gotten your brain from your other parent.",
            "You changed your mind? Does this one work any better?",
            "I’m surprised and pleased—but a little more surprised than pleased.",
            "Sorry, it’s hereditary.",
            "Don’t be a screen door on a submarine.",
            "I know you are, but what am I?",
            "You’re the reason they have to put instructions on shampoo bottles.",
            "You’re about as useful as a knitted umbrella.",
            "If laughter is the best medicine, your face must be curing the world.",
            "I’m multitasking: I can listen to you and ignore you at the same time.",
            "If I had a dollar for every smart thing you said, I’d be broke.",
            "I’d explain it to you, but I left my dictionary of simple words at home.",
            "You bring so much joy to a room... every time you leave it.",
            "You’re like a software update. Whenever I see you, I think, 'Not now'.",
            "I’m not an astronomer, but I’m pretty sure the world doesn’t revolve around you.",
            "Is your name Wi-Fi? Because I’m feeling zero connection.",
            "I’d roast you, but my mom told me not to burn trash."
        ];

        const jokeLibrary = [
            "What do you call a fake noodle? An Impasta!",
            "Why don't scientists trust atoms? Because they make up everything!",
            "What do you call a sleeping bull? A bulldozer!",
            "How does a penguin build its house? Igloos it together!",
            "Why did the math book look sad? Because it had too many problems.",
            "What do you call a bear with no teeth? A gummy bear!",
            "Why can't you give Elsa a balloon? Because she will let it go!",
            "What did one plate say to the other? Dinner is on me!",
            "Why did the computer go to the doctor? Because it had a virus!",
            "What do you call a fly without wings? A walk!"
        ];

        function playActualMusic() {
            const track = tracks[Math.floor(Math.random() * tracks.length)];
            audioPlayer.src = track.url;
            audioPlayer.play();
            return `Sure! Playing ${track.name} for you.`;
        }

        function stopMusic() {
            audioPlayer.pause();
            return "Music stopped.";
        }

        function getOfflineReply(input) {
            const cmd = input.toLowerCase();
            if (cmd.includes("time")) {
                return `The time is ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}.`;
            }
            if (cmd.includes("roast") || cmd.includes("burn") || cmd.includes("battle")) {
                return roastLibrary[Math.floor(Math.random() * roastLibrary.length)];
            }
            if (cmd.includes("joke")) {
                return jokeLibrary[Math.floor(Math.random() * jokeLibrary.length)];
            }
            if (cmd.includes("stop") && cmd.includes("music")) {
                return stopMusic();
            }
            if (cmd.includes("play music") || (cmd.includes("play") && cmd.includes("song"))) {
                return playActualMusic();
            }
            if (cmd.includes("weather") && !apiKey) {
                return "I'm in offline mode, but it looks like a clear day for a joke!";
            }
            if (cmd.includes("hello") || cmd.includes("hi ")) {
                return longTermMemory.name ? `Hello ${longTermMemory.name}, ready for some music or a joke?` : "Hello! How can I help you today?";
            }
            return null;
        }

        async function fetchAIResponse(query) {
            if (!apiKey) return { reply: "I'm offline. I can give you a joke, a roast, the time, or play some music!" };

            const memoryContext = JSON.stringify(longTermMemory);
            const systemPrompt = `You are a high-tech assistant for a minor. 
            CONNECTED: Use Google Search for facts/weather.
            MUSIC/JOKES: If asked to play music, say 'Playing music now'. If asked for a joke, tell a funny one.
            MEMORY: Remember: ${memoryContext}. 
            ROASTS: Use safe, funny ones only.
            RESPONSE: Return ONLY JSON: {"reply": "...", "memoryUpdate": {"key": "val"} or null}.`;

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: query }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        tools: [{ "google_search": {} }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) throw new Error("API Offline");
                const data = await response.json();
                const parsed = JSON.parse(data.candidates[0].content.parts[0].text);
                
                if (parsed.memoryUpdate) await updateMemory(parsed.memoryUpdate);
                return parsed;
            } catch (err) {
                return { reply: "Connection lost, but I can still tell jokes locally!" };
            }
        }

        function speak(text) {
            synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            if (preferredVoice) utterance.voice = preferredVoice;
            utterance.onstart = () => {
                isBusy = true;
                orb.classList.add('active');
                statusText.innerText = text;
            };
            utterance.onend = () => {
                isBusy = false;
                orb.classList.remove('active');
                statusText.innerText = "Tap to talk";
            };
            synth.speak(utterance);
        }

        window.handleStart = () => {
            if (isBusy) return;
            synth.speak(new SpeechSynthesisUtterance(""));
            recognition.start();
        };

        recognition.onstart = () => {
            isBusy = true;
            orb.classList.add('active');
            statusText.innerText = "Listening...";
        };

        recognition.onresult = async (event) => {
            const input = event.results[0][0].transcript;
            transcriptText.innerText = `"${input}"`;
            
            const offlineReply = getOfflineReply(input);
            if (offlineReply) {
                speak(offlineReply);
                return;
            }

            statusText.innerText = "Thinking...";
            const aiResult = await fetchAIResponse(input);
            speak(aiResult.reply);
        };

        recognition.onerror = () => {
            isBusy = false;
            orb.classList.remove('active');
            statusText.innerText = "Try speaking again.";
        };

        window.onload = loadVoices;
    </script>
    <style>
        body { background-color: #000; color: white; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .orb-container { position: relative; width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; }
        .orb { position: absolute; width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle, #00d2ff, #9d50bb, #3a7bd5); filter: blur(45px); opacity: 0.5; transition: all 0.5s ease; }
        .active .orb { animation: pulse 2s infinite ease-in-out; opacity: 0.8; filter: blur(30px); width: 180px; height: 180px; }
        @keyframes pulse { 0% { transform: scale(1); filter: hue-rotate(0deg); } 50% { transform: scale(1.1); filter: hue-rotate(90deg); } 100% { transform: scale(1); filter: hue-rotate(0deg); } }
        .visualizer { display: flex; align-items: center; gap: 5px; height: 60px; z-index: 10; }
        .bar { width: 4px; height: 10px; background: rgba(255, 255, 255, 0.2); border-radius: 4px; }
        .active .bar { background: #fff; animation: bounce 0.6s infinite alternate; }
        @keyframes bounce { from { height: 10px; } to { height: 45px; } }
        .status-text { font-size: 1.3rem; margin-top: 2rem; text-align: center; max-width: 85%; line-height: 1.5; min-height: 3.5em; }
        .transcript { color: rgba(255,255,255,0.4); font-size: 0.95rem; margin-top: 0.5rem; }
        .btn-assist { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 16px 40px; border-radius: 999px; margin-top: 2rem; cursor: pointer; backdrop-filter: blur(20px); color: white; transition: all 0.3s; }
        .btn-assist:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="orb-container" id="main-orb">
        <div class="orb"></div>
        <div class="visualizer" id="bars"></div>
    </div>
    <div class="status-text" id="status">Tap to speak</div>
    <div class="transcript" id="transcript">Ask me for a joke or to play music!</div>
    <button class="btn-assist" onclick="handleStart()" id="start-btn">Start Listening</button>
</body>
</html>
