<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siri-Style Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Siri Waveform Animation */
        .orb-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orb {
            position: absolute;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5, #00d2ff);
            filter: blur(40px);
            opacity: 0.6;
            transition: all 0.5s ease;
        }

        .listening .orb {
            animation: pulse 1.5s infinite ease-in-out;
            opacity: 0.9;
            filter: blur(20px);
            width: 180px;
            height: 180px;
        }

        @keyframes pulse {
            0% { transform: scale(1); background: #00d2ff; }
            50% { transform: scale(1.2); background: #9d50bb; }
            100% { transform: scale(1); background: #6e48aa; }
        }

        .visualizer {
            display: flex;
            align-items: center;
            gap: 5px;
            height: 60px;
            margin-top: 20px;
        }

        .bar {
            width: 4px;
            height: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            transition: height 0.1s ease;
        }

        .listening .bar {
            background: #fff;
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { height: 10px; }
            to { height: 40px; }
        }

        .status-text {
            font-size: 1.5rem;
            font-weight: 300;
            margin-top: 2rem;
            text-align: center;
            min-height: 3rem;
            max-width: 80%;
        }

        .transcript {
            color: rgba(255,255,255,0.5);
            font-size: 1rem;
            margin-top: 1rem;
        }

        .btn-assist {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 24px;
            border-radius: 999px;
            margin-top: 30px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
            user-select: none;
            font-weight: 500;
        }

        .btn-assist:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .btn-assist:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="orb-container" id="visualizer-container">
        <div class="orb"></div>
        <div class="visualizer" id="bars">
            <!-- Bars generated by JS -->
        </div>
    </div>

    <div class="status-text" id="status">Tap to start</div>
    <div class="transcript" id="transcript">I'm ready to listen.</div>

    <button class="btn-assist" id="start-btn">
        Start Listening
    </button>

    <div class="mt-8 text-xs text-gray-500 uppercase tracking-widest flex flex-wrap justify-center gap-4 px-4">
        <span>"Time"</span>
        <span>"Date"</span>
        <span>"Weather"</span>
        <span>"Joke"</span>
        <span>"Compliment"</span>
    </div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status');
        const transcriptText = document.getElementById('transcript');
        const container = document.getElementById('visualizer-container');
        const barsContainer = document.getElementById('bars');

        let isListening = false;
        let preferredVoice = null;
        let hasUnlockedAudio = false;

        for(let i=0; i<15; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.animationDelay = `${i * 0.05}s`;
            barsContainer.appendChild(bar);
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;

        function loadVoices() {
            const voices = synth.getVoices();
            // Look for high quality English voices
            preferredVoice = voices.find(v => 
                v.name.includes('Samantha') || 
                v.name.includes('Google UK English Female') || 
                (v.lang.startsWith('en') && v.name.includes('Female'))
            );
            if (!preferredVoice && voices.length > 0) preferredVoice = voices[0];
        }

        if (synth.onvoiceschanged !== undefined) {
            synth.onvoiceschanged = loadVoices;
        }
        loadVoices();

        if (!SpeechRecognition) {
            statusText.innerText = "Speech Recognition not supported.";
            startBtn.style.display = "none";
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.continuous = false;

        const responses = {
            "hello": "Hi there! I am your personal voice assistant. How can I help you today?",
            "hi": "Hello! I'm here and ready to help.",
            "time": () => `The current time is ${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}.`,
            "date": () => `Today is ${new Date().toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}.`,
            "joke": [
                "Why was the computer cold? It left its Windows open!",
                "What do you call a snowman with a six pack? An abdominal snowman!",
                "Why did the math book look sad? Because it had too many problems."
            ],
            "weather": "I can't check the sky from inside this code, but I hope it's nice outside!",
            "compliment": "You have an amazing mind and great curiosity!",
            "who are you": "I am a simple voice interface built with HTML and JavaScript.",
            "bye": "Goodbye! See you later."
        };

        function getResponse(text) {
            text = text.toLowerCase();
            for (let key in responses) {
                if (text.includes(key)) {
                    const val = responses[key];
                    if (typeof val === 'function') return val();
                    if (Array.isArray(val)) return val[Math.floor(Math.random() * val.length)];
                    return val;
                }
            }
            return "I'm sorry, I don't know that one. Try asking for the time or a joke.";
        }

        function speak(text) {
            // Cancel and Resume are key to clearing stalled speech queues in many browsers
            synth.cancel();
            synth.resume();
            
            const utterance = new SpeechSynthesisUtterance(text);
            
            // Using system defaults for pitch/rate can sometimes fix "isTrusted" errors
            if (preferredVoice) {
                utterance.voice = preferredVoice;
            }
            
            utterance.onstart = () => {
                container.classList.add('listening');
                statusText.innerText = text;
                startBtn.disabled = true;
                startBtn.innerText = "Speaking...";
            };
            
            utterance.onend = () => {
                container.classList.remove('listening');
                statusText.innerText = "Tap to start";
                startBtn.disabled = false;
                startBtn.innerText = "Start Listening";
            };

            utterance.onerror = (event) => {
                console.error("SpeechSynthesis error:", event);
                container.classList.remove('listening');
                statusText.innerText = "Tap to start";
                startBtn.disabled = false;
                startBtn.innerText = "Start Listening";
            };

            // Wrap in a timeout to ensure state transitions complete
            setTimeout(() => {
                synth.speak(utterance);
            }, 50);
        }

        function unlockAudio() {
            if (!hasUnlockedAudio) {
                // Some browsers require a "blank" speak to unlock the audio context
                const dummy = new SpeechSynthesisUtterance("");
                synth.speak(dummy);
                hasUnlockedAudio = true;
            }
        }

        startBtn.onclick = () => {
            unlockAudio();
            
            if (isListening || synth.speaking) {
                synth.cancel();
                return;
            }
            
            try {
                recognition.start();
            } catch(e) {
                console.warn("Recognition start failed", e);
            }
        };

        recognition.onstart = () => {
            isListening = true;
            startBtn.disabled = true;
            startBtn.innerText = "Listening...";
            container.classList.add('listening');
            statusText.innerText = "Listening...";
            transcriptText.innerText = "Speak now...";
        };

        recognition.onresult = (event) => {
            isListening = false;
            const result = event.results[0][0].transcript;
            transcriptText.innerText = `You said: "${result}"`;
            
            const reply = getResponse(result);
            // Delay helps ensure microphone is closed before speaker opens
            setTimeout(() => {
                speak(reply);
            }, 400);
        };

        recognition.onerror = (event) => {
            isListening = false;
            startBtn.disabled = false;
            startBtn.innerText = "Start Listening";
            container.classList.remove('listening');
            statusText.innerText = "I didn't catch that.";
        };

        recognition.onend = () => {
            isListening = false;
            if (!synth.speaking) {
                startBtn.disabled = false;
                startBtn.innerText = "Start Listening";
                container.classList.remove('listening');
            }
        };
    </script>
</body>
</html>
